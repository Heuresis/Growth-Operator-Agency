skill_id: write-reel
skill_path: skills/write-reel/SKILL.md
skill_name: "Short-Form Video Script Producer"

tier: structured_ai
category: marketing
temperature_gate: warm

role_affinity:
  - marketing-lead
  - short-form

required_tables:
  - creators
  - agents
  - events
  - documents
  - posts                              # reel belongs to calendar slot
  - assets                             # video file + captions + thumbnails

tools:
  - file_read
  - file_write

required_mcps:
  - filesystem

required_integrations:
  social_posting:
    - instagram-graph-api
    - tiktok-content-posting-api
    - youtube-data-api
  scheduling: buffer-api
  captions:
    - descript-api
    - veed-api

credentials_required:
  - INSTAGRAM_ACCESS_TOKEN
  - TIKTOK_ACCESS_TOKEN
  - YOUTUBE_DATA_API_KEY

execution_mode: interactive
temperature: 0.3

evidence_gate:
  - framework_variant_selected
  - 60s_timing_grid_complete
  - hook_specificity_gte_8
  - loop_or_cta_present
  - voice_matched
  - platform_adaptations_specified
  - signal_score_gte_0_8

context_slices:
  read:
    - audience_intelligence_system
    - offer_architecture
    - copy_messaging
    - content_strategy
    - creator_identity_matrix.brand_voice_architecture
  write:
    - content_strategy.published_assets

output:
  location: "output/write-reel/{date}-reel-{brief-id}.md"
  format: markdown
  signal_tuple:
    mode: linguistic
    genre: reel-script
    type: inform
    format: markdown
    structure: variant-dependent-w-reel-script
  receiver: creator

next_skill_routing:
  on_complete:
    - condition: "anchor_derivative_chain_active"
      recommend: repurpose
    - condition: "linkedin_repurpose_pending"
      recommend: write-linkedin-post
    - condition: "stories_pending"
      recommend: story-sequence
  on_fail:
    escalate_to: marketing-lead

logging:
  phase_transitions: true
  source_count: true
  confidence_per_section: true
  blind_output_test_required: true
