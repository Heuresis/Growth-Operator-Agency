skill_id: competitor-intel
skill_path: skills/competitor-intel/SKILL.md
skill_name: "Competitor Teardown + Whitespace Analyzer"

tier: structured_ai
category: scale
temperature_gate: warm

role_affinity:
  - scale-head
  - competitor

required_tables:
  - creators
  - agents
  - events
  - documents

tools:
  - web_search
  - web_fetch
  - file_read
  - file_write

execution_mode: interactive
temperature: 0.3

evidence_gate:
  - 3_tier_matrix_complete
  - min_3_direct_competitors
  - whitespace_identified
  - signal_score_gte_0_8

context_slices:
  read:
    - audience_intelligence_system
    - offer_architecture
  write:
    - audience_intelligence_system

output:
  location: "output/competitor-intel/{date}-competitor-intel.md"
  format: markdown
  signal_tuple:
    mode: linguistic
    genre: competitor-intel
    type: inform
    format: markdown
    structure: w-competitor-intel
  receiver: creator + marketing lead

next_skill_routing:
  on_complete:
    - condition: "whitespace_reshapes_positioning"
      recommend: build-positioning
    - condition: "ad_angle_opportunity"
      recommend: ad-creative
    - condition: "contrarian_content_opportunity"
      recommend: write-linkedin-post
  on_fail:
    escalate_to: scale-head

logging:
  phase_transitions: true
  source_count: true
  confidence_per_section: true
  blind_output_test_required: false
