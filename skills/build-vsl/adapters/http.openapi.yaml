openapi: 3.1.0
info:
  title: build-vsl
  version: 1.0.0
  x-skill-source: ../SKILL.md
  x-signal-tuple: { mode: linguistic, genre: vsl-script, type: direct, format: markdown, structure: variant-dependent-w-vsl }
servers:
  - url: https://{host}/api/v1
    variables: { host: { default: growth-os.local } }
security: [ { GrowthOSKey: [] } ]
paths:
  /skills/build-vsl/execute:
    post:
      summary: Execute build-vsl (VSL script — 5 variants A/B/C/D/E — 15-step, pull-push-persuade 11-step, 13-step VSL, three-phase VSL formula, hidden-pitch long-form video)
      x-evidence-gate: [variant_selected_with_reasoning, all_framework_beats_complete, 8_required_beliefs_installed, mechanism_threaded_through, voice_match_verified, crossroads_or_equivalent_close_present, signal_score_gte_0_8, blind_output_test_3_of_3]
      x-streaming: supported
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Input' } } } }
      responses:
        '200': { description: Passed, content: { application/json: { schema: { $ref: '#/components/schemas/Output' } }, text/event-stream: { schema: { type: string, description: SSE — events phase/partial/done } } } }
        '400': { description: Bad inputs }
        '401': { description: Unauthorized }
        '403': { description: Scope violation (INV-8) }
        '422': { description: Held (quality gate failed — often variant-mismatch or mechanism-not-threaded) }
        '429': { description: Rate-limited }
        '500': { description: Runtime error }
components:
  securitySchemes: { GrowthOSKey: { type: apiKey, in: header, name: X-Growth-OS-Key } }
  schemas:
    Input:
      type: object
      required: [skill, inputs, context_profile_id]
      properties:
        skill: { type: string, const: build-vsl }
        inputs:
          type: object
          required: [audience_intelligence_system_score, offer_architecture_score, copy_messaging_score]
          properties:
            audience_intelligence_system_score: { type: number, minimum: 60 }
            offer_architecture_score: { type: number, minimum: 70 }
            copy_messaging_score: { type: number, minimum: 40 }
            offer_doc_ref: { type: string, description: Path to Offer Document (required) }
            positioning_doc_ref: { type: string }
            brand_voice_doc_ref: { type: string }
            icp_doc_ref: { type: string }
            variant_hint: { type: string, enum: [A, B, C, D, E], description: A=Pampa15, B=Hogendoorn11, C=Trister13, D=Benson3X, E=the growth engineer-Hidden }
        context_profile_id: { type: string }
        options:
          type: object
          properties: { stream: { type: boolean, default: true }, variant: { type: string, enum: [A, B, C, D, E] }, dry_run: { type: boolean, default: false } }
    Output:
      type: object
      required: [artifact_ref, status, quality_score, signal_theory_tuple]
      properties:
        artifact_ref: { type: string, description: "output/build-vsl/{date}-vsl-script-variant-{A|B|C|D|E}.md" }
        status: { type: string, enum: [passed, held, failed] }
        quality_score: { type: number, minimum: 0, maximum: 1 }
        signal_theory_tuple:
          type: object
          properties: { mode: { type: string }, genre: { type: string }, type: { type: string }, format: { type: string }, structure: { type: string } }
        cost_tokens: { type: integer }
        evidence_ref: { type: string }
