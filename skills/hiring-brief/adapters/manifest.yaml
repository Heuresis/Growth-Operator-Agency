skill_id: hiring-brief
skill_path: skills/hiring-brief/SKILL.md
skill_name: "8-Role Hiring Brief Generator"

tier: structured_ai
category: scale
temperature_gate: warm

role_affinity:
  - scale-lead
  - team-builder

required_tables:
  - creators
  - agents
  - events
  - documents

tools:
  - file_read
  - file_write

execution_mode: interactive
temperature: 0.3

evidence_gate:
  - role_selected
  - scorecard_5_plus_competencies
  - ideal_profile_specific
  - outreach_script_provided
  - interview_questions_5_plus_rounds
  - 30_60_90_plan_present
  - revenue_threshold_aligned
  - signal_score_gte_0_8

context_slices:
  read:
    - offer_architecture
    - operational_intelligence
  write:
    - operational_intelligence

output:
  location: "output/hiring-brief/{date}-hiring-brief-{role}.md"
  format: markdown
  signal_tuple:
    mode: linguistic
    genre: hiring-brief
    type: inform
    format: markdown
    structure: w-hiring-brief
  receiver: creator + hiring manager + candidates

next_skill_routing:
  on_complete:
    - condition: "sop_missing_for_role"
      recommend: build-sop
    - condition: "role == customer_success"
      recommend: retention-check
    - condition: "hire_impacts_pnl"
      recommend: revenue-report
  on_fail:
    escalate_to: scale-lead

logging:
  phase_transitions: true
  source_count: true
  confidence_per_section: true
  blind_output_test_required: false
