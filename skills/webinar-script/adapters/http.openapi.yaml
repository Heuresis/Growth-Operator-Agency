openapi: 3.1.0
info:
  title: webinar-script
  version: 1.0.0
  x-skill-source: ../SKILL.md
  x-signal-tuple: { mode: linguistic, genre: webinar-script, type: direct, format: markdown, structure: w-webinar-script-5-section }
servers:
  - url: https://{host}/api/v1
    variables: { host: { default: growth-os.local } }
security: [ { GrowthOSKey: [] } ]
paths:
  /skills/webinar-script/execute:
    post:
      summary: Execute webinar-script (7-Figure Webinar — 6 variants Live/Evergreen/3-Day/5-Day/7-Day/Workshop — 5-section structure)
      x-evidence-gate: [variant_selected, 5_section_structure_complete, 8_required_beliefs_installed, 10_plus_objections_handled_in_qa, bonus_stack_5_plus, crossroads_close_present, isomorphic_case_studies, voice_matched, signal_score_gte_0_8, blind_output_test_3_of_3]
      x-streaming: supported
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Input' } } } }
      responses:
        '200': { description: Passed, content: { application/json: { schema: { $ref: '#/components/schemas/Output' } } } }
        '400': { description: Bad inputs }
        '401': { description: Unauthorized }
        '403': { description: Scope violation (INV-8) }
        '422': { description: Held (quality gate failed) }
        '429': { description: Rate-limited }
        '500': { description: Runtime error }
components:
  securitySchemes: { GrowthOSKey: { type: apiKey, in: header, name: X-Growth-OS-Key } }
  schemas:
    Input:
      type: object
      required: [skill, inputs, context_profile_id]
      properties:
        skill: { type: string, const: webinar-script }
        inputs:
          type: object
          required: [audience_intelligence_system_score, offer_architecture_score, copy_messaging_score]
          properties:
            audience_intelligence_system_score: { type: number, minimum: 70 }
            offer_architecture_score: { type: number, minimum: 70 }
            copy_messaging_score: { type: number, minimum: 50 }
            education_nurture_score: { type: number, minimum: 30 }
            offer_doc_ref: { type: string, description: Path to Offer Document }
            brand_voice_doc_ref: { type: string }
            icp_doc_ref: { type: string }
            variant_hint: { type: integer, enum: [1, 2, 3, 4, 5, 6], description: 1=Live, 2=Evergreen, 3=3-Day, 4=5-Day, 5=7-Day, 6=Workshop }
        context_profile_id: { type: string }
        options:
          type: object
          properties: { stream: { type: boolean, default: false }, variant: { type: integer, enum: [1, 2, 3, 4, 5, 6] }, dry_run: { type: boolean, default: false } }
    Output:
      type: object
      required: [artifact_ref, status, quality_score, signal_theory_tuple]
      properties:
        artifact_ref: { type: string, description: "output/webinar-script/{date}-variant{N}-{title-slug}.md" }
        status: { type: string, enum: [passed, held, failed] }
        quality_score: { type: number, minimum: 0, maximum: 1 }
        signal_theory_tuple:
          type: object
          properties: { mode: { type: string }, genre: { type: string }, type: { type: string }, format: { type: string }, structure: { type: string } }
        cost_tokens: { type: integer }
        evidence_ref: { type: string }
