skill_id: webinar-script
skill_path: skills/webinar-script/SKILL.md
skill_name: "7-Figure Webinar Script Producer (6 Variants)"

sorx_tier: reasoning_ai
category: nurture
temperature_gate: warm

role_affinity:
  - nurture-lead
  - webinar

required_tables:
  - creators
  - agents
  - events
  - documents
  - offers
  - webinars
  - campaigns

tools:
  - file_read
  - file_write

execution_mode: interactive
temperature: 0.5

evidence_gate:
  - variant_selected
  - 5_section_structure_complete
  - 8_required_beliefs_installed
  - 10_plus_objections_handled_in_qa
  - bonus_stack_5_plus
  - crossroads_close_present
  - isomorphic_case_studies
  - voice_matched
  - signal_score_gte_0_8
  - blind_output_test_3_of_3

context_slices:
  read:
    - audience_intelligence_system
    - offer_architecture
    - copy_messaging
    - education_nurture
  write:
    - education_nurture.webinars_published
    - offer_architecture.webinar_variants_locked

output:
  location: "output/webinar-script/{date}-variant{N}-{title-slug}.md"
  format: markdown
  signal_tuple:
    mode: linguistic
    genre: webinar-script
    type: direct
    format: markdown
    structure: w-webinar-script-5-section
  receiver: webinar attendee

next_skill_routing:
  on_complete:
    - condition: "promo_sequence_needed"
      recommend: email-sequence
    - condition: "variant in [1, 3, 4, 5]"
      recommend: post-booking-nurture
    - condition: "invite_content_needed"
      recommend: write-linkedin-post
  on_fail:
    escalate_to: nurture-lead

logging:
  phase_transitions: true
  source_count: true
  confidence_per_section: true
  blind_output_test_required: true
