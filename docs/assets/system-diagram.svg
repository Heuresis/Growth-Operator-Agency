    .sans { font-family: "Geist", "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .serif { font-family: "Geist", "Inter", system-ui, -apple-system, sans-serif; font-weight: 500; letter-spacing: -0.02em; }
