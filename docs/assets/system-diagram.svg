    .serif { font-family: "Geist", "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-weight: 500; letter-spacing: -0.02em; }
    .mono { font-family: "Geist Mono", "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace; }
