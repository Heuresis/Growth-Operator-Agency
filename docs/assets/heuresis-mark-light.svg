<svg xmlns="http://www.w3.org/2000/svg" viewBox="130 130 252 252" width="512" height="512">
  <!--
    ═══════════════════════════════════════════════
    HEURESIS — The Point of Discovery
    v2 Light — Dimensional core

    Same principle: flat rings, real core.
    On light background, the core is dark with a
    subtle upper-left highlight — the light still
    finds it, even in darkness. Discovery catches light.
    ═══════════════════════════════════════════════
  -->

  <defs>
    <!--
      Core gradient — dark matte sphere, upper-left light.
      Dark face with a subtle lighter region where light hits.
      Still reads as "dark" overall. The highlight is restrained.
    -->
    <radialGradient id="l-core" cx="38%" cy="35%" r="68%" fx="33%" fy="30%">
      <stop offset="0%" stop-color="#4A4A4A"/>
      <stop offset="55%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>

    <!--
      Particle gradient — same light, same material.
    -->
    <radialGradient id="l-particle" cx="36%" cy="33%" r="70%">
      <stop offset="0%" stop-color="#3A3A3A"/>
      <stop offset="60%" stop-color="#181818"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>


  <!-- background removed for transparency -->


  <!-- ═══ RING 2 — outer container (flat, abstract) ═══ -->
  <circle cx="256" cy="256" r="102"
    fill="none"
    stroke="#000000"
    stroke-width="1.2"
    opacity="0.13"/>


  <!-- ═══ RING 1 — THE BROKEN RING (flat, abstract) ═══ -->
  <path
    d="M 316,237 A 63,63 0 1,1 275,196"
    fill="none"
    stroke="#000000"
    stroke-width="2.8"
    stroke-linecap="round"
    opacity="0.80"/>


  <!-- ═══ THE CORE — dimensional, real ═══ -->
  <circle cx="256" cy="256" r="24"
    fill="url(#l-core)"/>


  <!-- ═══ THE PARTICLE — same material, same light ═══ -->
  <circle cx="317" cy="194" r="7"
    fill="url(#l-particle)"/>

</svg>