      .hb-subtitle { font-family: "Geist", "Inter", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-weight: 400; letter-spacing: -0.01em; fill: #3f3f46; }
      .hb-tagline { font-family: "Geist Mono", "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace; font-weight: 400; letter-spacing: 0; fill: #52525b; }
      .hb-label { font-family: "Geist Mono", "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace; font-weight: 500; letter-spacing: 0.24em; text-transform: uppercase; fill: #71717a; }
      .hb-meta { font-family: "Geist Mono", "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace; font-weight: 400; letter-spacing: 0.04em; fill: #71717a; }
