<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-label="Encoding flywheel — each cycle deepens the encoding">
  <title>Encoding Flywheel</title>

  <defs>
    <style>
      .f-label { font-family: "Geist Mono", "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace; font-weight: 500; letter-spacing: 0.24em; text-transform: uppercase; }
      .f-title { font-family: "Geist", "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-weight: 500; letter-spacing: -0.02em; }
      .f-sub { font-family: "Geist", "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; font-weight: 400; }
      .f-num { font-family: "Geist Mono", "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace; font-weight: 400; letter-spacing: -0.04em; }
      .f-code { font-family: "Geist Mono", "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace; font-weight: 400; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#000000"/>

  <text class="f-label" x="600" y="56" font-size="12" fill="#71717a" text-anchor="middle">Growth OS  ·  encoding flywheel</text>
  <text class="f-title" x="600" y="96" font-size="34" fill="#fafafa" text-anchor="middle">Each cycle deepens the encoding.</text>
  <text class="f-sub" x="600" y="130" font-size="16" fill="#a1a1aa" text-anchor="middle">The compounding gap to un-encoded operators widens monthly.</text>

  <g transform="translate(100 180)">
    <rect x="0" y="0" width="1000" height="84" fill="#0a0a0a" stroke="#27272a" stroke-width="1" rx="12"/>
    <text class="f-num" x="32" y="56" font-size="42" fill="#3f3f46">01</text>
    <text class="f-title" x="112" y="36" font-size="18" fill="#fafafa">Cycle 1 — manual expert download</text>
    <text class="f-sub" x="112" y="60" font-size="13" fill="#a1a1aa">Creator fills the 11 compartments through the /research interview. Everything is first-principles.</text>
    <g transform="translate(600 40)">
      <rect x="0" y="0" width="260" height="6" fill="#27272a" rx="3"/>
      <rect x="0" y="0" width="52" height="6" fill="#d97706" rx="3"/>
    </g>
    <text class="f-code" x="878" y="49" font-size="11" fill="#71717a">Skeleton · 20%</text>
  </g>

  <g transform="translate(100 280)">
    <rect x="0" y="0" width="1000" height="84" fill="#0a0a0a" stroke="#27272a" stroke-width="1" rx="12"/>
    <text class="f-num" x="32" y="56" font-size="42" fill="#3f3f46">02</text>
    <text class="f-title" x="112" y="36" font-size="18" fill="#fafafa">Cycle 2 — patterns emerge</text>
    <text class="f-sub" x="112" y="60" font-size="13" fill="#a1a1aa">Templates get reused. Voice calibrates. ICP and Offer reach Foundation tier. First external assets ship.</text>
    <g transform="translate(600 40)">
      <rect x="0" y="0" width="260" height="6" fill="#27272a" rx="3"/>
      <rect x="0" y="0" width="117" height="6" fill="#d97706" rx="3"/>
    </g>
    <text class="f-code" x="870" y="49" font-size="11" fill="#71717a">Foundation · 45%</text>
  </g>

  <g transform="translate(100 380)">
    <rect x="0" y="0" width="1000" height="84" fill="#0a0a0a" stroke="#27272a" stroke-width="1" rx="12"/>
    <text class="f-num" x="32" y="56" font-size="42" fill="#3f3f46">03</text>
    <text class="f-title" x="112" y="36" font-size="18" fill="#fafafa">Cycle 3 — auto-capture begins</text>
    <text class="f-sub" x="112" y="60" font-size="13" fill="#a1a1aa">System proposes compartment updates from real outputs. Sacred-format skills enter blind-output testing.</text>
    <g transform="translate(600 40)">
      <rect x="0" y="0" width="260" height="6" fill="#27272a" rx="3"/>
      <rect x="0" y="0" width="169" height="6" fill="#d97706" rx="3"/>
    </g>
    <text class="f-code" x="896" y="49" font-size="11" fill="#71717a">Solid · 65%</text>
  </g>

  <g transform="translate(100 480)">
    <rect x="0" y="0" width="1000" height="84" fill="#0a0a0a" stroke="#27272a" stroke-width="1" rx="12"/>
    <text class="f-num" x="32" y="56" font-size="42" fill="#3f3f46">04</text>
    <text class="f-title" x="112" y="36" font-size="18" fill="#fafafa">Cycle 4 — capture outputs</text>
    <text class="f-sub" x="112" y="60" font-size="13" fill="#a1a1aa">Every shipped asset feeds the workspace. Voice is voice-accurate. Mechanism is mechanism-specific.</text>
    <g transform="translate(600 40)">
      <rect x="0" y="0" width="260" height="6" fill="#27272a" rx="3"/>
      <rect x="0" y="0" width="208" height="6" fill="#d97706" rx="3"/>
    </g>
    <text class="f-code" x="876" y="49" font-size="11" fill="#71717a">Optimized · 80%</text>
  </g>

  <g transform="translate(100 580)">
    <rect x="0" y="0" width="1000" height="84" fill="#fafafa" stroke="#fafafa" stroke-width="1" rx="12"/>
    <text class="f-num" x="32" y="56" font-size="42" fill="#d4d4d8">05</text>
    <text class="f-title" x="112" y="36" font-size="18" fill="#09090b">Cycle 5+ — encoded encoding</text>
    <text class="f-sub" x="112" y="60" font-size="13" fill="#52525b">The encoding process is itself encoded. System drafts; creator validates instead of writes. Blind-test indistinguishable.</text>
    <g transform="translate(600 40)">
      <rect x="0" y="0" width="260" height="6" fill="#e4e4e7" rx="3"/>
      <rect x="0" y="0" width="247" height="6" fill="#b45309" rx="3"/>
    </g>
    <text class="f-code" x="886" y="49" font-size="11" fill="#71717a">Elite · 95%</text>
  </g>

  <text class="f-code" x="600" y="716" font-size="12" fill="#52525b" text-anchor="middle">every interaction deepens encoding  ·  every cycle makes the next cycle better</text>
</svg>
