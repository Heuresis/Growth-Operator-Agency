# company.yaml — Creator Configuration Template
# ============================================================
# This file stores the actual values for THIS creator's 11 Compartment
# Creator Context Profile. The schema is defined in ENCODING.md.
# Completeness of each compartment determines which skills unlock.
#
# USAGE: Clone this template, fill in every field with real creator data,
# interview-style if needed. Skills will refuse to execute if their
# required compartments are below threshold. See spec/CONTEXT-THRESHOLDS.md.
#
# PRIVATE: This file contains creator IP. Never push to public repos.
# ============================================================

# ---- Basic workspace metadata ----
name: "[CREATOR_BRAND_NAME]"
slug: "[creator-brand-slug]"
description: "[One-sentence description of the business]"
mission: "[North star mission statement]"
issue_prefix: "[PREFIX-]"                # e.g. "ACME-"

# ---- Budget & governance (workspace spec) ----
budget:
  monthly_usd: 0
  per_agent_usd: 500
  enforcement: warning                    # visibility | warning | stop

governance:
  board_approval_required:
    - new_agent_hire
    - budget_increase_pct: 20
    - new_workflow_production
    - pricing_change
    - guarantee_change
  immutable_log: true
  escalation_chain:
    - growth-ceo
    - creator
  signal_threshold: 0.8                   # S/N gate for external-facing output
  signal_threshold_internal: 0.5

# ============================================================
# COMPARTMENT 1 — CREATOR IDENTITY MATRIX (weight 15%)
# ============================================================
creator_identity_matrix:
  basic_info:
    creator_name: ""
    brand_name: ""
    industry_vertical: ""                 # Coaching / Consulting / Agency / Info / SaaS / E-com
    business_model: ""                    # High-ticket coaching | Agency retainer | Course | Membership | Hybrid
    revenue_tier: ""                      # pre-revenue | 10K-50K | 50K-250K | 250K-1M | 1M+
    years_active: 0

  brand_voice_architecture:
    communication_style: ""               # direct / consultative / storytelling / analytical / contrarian
    tone_framework:
      primary: ""
      secondary: ""
    personality_traits: []                # 3-5 traits
    language_patterns: []
    phrases_to_use: []                    # creator's verbatim phrases
    phrases_to_avoid: []
    persuasion_style: ""                  # authority-by-proof / story-first / mechanism-first / contrarian-provocation
    authority_positioning: ""             # Category-king / challenger / insider / outsider-with-edge

  unique_positioning:
    unique_mechanism: ""                  # Named mechanism
    category_positioning: ""
    competitive_differentiation: ""
    core_philosophy: ""
    contrarian_beliefs: []

# ============================================================
# COMPARTMENT 2 — AUDIENCE INTELLIGENCE SYSTEM (weight 20% HEAVIEST)
# ============================================================
audience_intelligence_system:
  ideal_customer_profile:
    demographics:
      age_range: ""
      gender_split: ""
      geography: []
      income_range: ""
      education: ""
    firmographics:
      role: ""
      company_stage: ""
      revenue_stage: ""
      industry: []
    psychographics:
      pain_points: []                     # 5-10 specific pains
      desires: []                         # 5-10 outcomes
      fears: []
      aspirations: []
      beliefs: []
      objections: []                      # min 10
    behavioral_patterns:
      buying_triggers: []
      decision_making_process: ""
      research_behavior: []
      trust_signals_required: []

  market_sophistication:
    awareness_level: ""                   # unaware | problem-aware | solution-aware | product-aware | most-aware
    solution_awareness: ""                # naive | aware | skeptical | exhausted
    market_maturity: ""                   # emerging | growing | mature | saturated
    competitive_density: ""               # low | medium | high | saturated

  voice_of_customer:
    actual_customer_language: []          # verbatim from calls/DMs/reviews
    pain_language_patterns: []
    desire_language_patterns: []
    objection_patterns: []

  limiting_belief_diagnosis:
    dominant_belief: ""                   # worthless | helpless | hopeless
    transformation_type: ""               # status | capability | safety

# ============================================================
# COMPARTMENT 3 — OFFER ARCHITECTURE (weight 15%)
# ============================================================
offer_architecture:
  core_offers: []                         # see ENCODING.md for full sub-schema

  offer_ladder:
    lead_magnet: ""
    tripwire: ""
    core_offer: ""
    upsells: []
    high_ticket: ""
    continuity: ""

  pricing_psychology:
    pricing_strategy: ""                  # identity-aligned | value-based | competitive | anchor-and-discount
    payment_options: []
    comparison_anchoring: ""
    value_justification: ""

  economics_validation:
    ltv: 0
    cac: 0
    ltv_cac_ratio: 0                      # MUST be >= 3.0 to pass INV-4
    gross_margin_pct: 0                   # target >= 70%
    breakeven_per_cohort: ""

